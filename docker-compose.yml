services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: commerceflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-commerceflow}
      POSTGRES_USER: ${POSTGRES_USER:-commerceflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-commerceflow_local_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: commerceflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

